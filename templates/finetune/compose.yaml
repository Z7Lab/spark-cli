# Dedicated Unsloth QLoRA fine-tune stack for `spark llm finetune`.
#
# Like the ai-toolkit training stack and the ComfyUI stack, spark does NOT build
# or vendor this image — it drives an operator-provided, digest-pinned Unsloth
# image (UNSLOTH_IMAGE in .env, from cfg.unsloth_image). That keeps Unsloth's
# brittle GB10/sm_121 dep tree (torch / bitsandbytes / triton / xformers, all
# built for sm_121/sbsa) out of this repo: someone pins a working image once
# (build from Dockerfile.reference, or use a published GB10 image), spark runs it.
#
# Runs ONLY during a dedicated fine-tune session (the box does nothing else while
# training — the unified memory is shared). Host dirs are bind-mounted (relative
# to this file's location, i.e. {finetune_dir}) so checkpoints, the rendered job
# config, and run state survive across the time-boxed sessions = resume.
#
# `spark llm finetune` deploys this verbatim into {finetune_dir} and runs the
# watchdog with
#   docker compose run --rm trainer /workspace/bin/spark_finetune.py ...
# inside a detached screen session on the host (like `serve` and `train`).

services:
  trainer:
    image: ${UNSLOTH_IMAGE}
    # GPU via CDI (nvidia.com/gpu=all) — the rootless-Docker pattern the ComfyUI /
    # ai-toolkit stacks use on the DGX Spark; NOT legacy `runtime: nvidia`
    # (unregistered under rootless). Exposes the full unified-memory fabric.
    devices:
      - nvidia.com/gpu=all
    # Inject {finetune_dir}/.env into the container. It always has UNSLOTH_IMAGE,
    # and HF_TOKEN ONLY when one is in spark's environment (needed for a gated base
    # repo). Using env_file (not an `HF_TOKEN=${HF_TOKEN:-}` line) means the token
    # is simply absent for an ungated base — never an empty "Bearer " header that
    # breaks HF downloads.
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/cache/huggingface
    shm_size: "32gb"
    ipc: host
    ulimits:
      # memlock: -1 omitted — rootless Docker cannot raise RLIMIT_MEMLOCK past the
      # user's limit (rlimit type 8: operation not permitted), matching the other stacks.
      stack: 67108864
    volumes:
      - ./datasets:/workspace/datasets
      - ./configs:/workspace/configs
      - ./output:/workspace/output
      - ./state:/workspace/state
      - ./control:/workspace/control
      - ./bin:/workspace/bin
      - ./cache/huggingface:/cache/huggingface
    working_dir: /workspace
    # spark drives this image with `docker compose run`, overriding the entrypoint
    # so the watchdog runs regardless of the image's own entrypoint.
    entrypoint: ["python3"]
    command: ["-c", "import time; time.sleep(2**31)"]
